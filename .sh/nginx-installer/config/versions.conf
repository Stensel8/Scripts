# Version configuration for NGINX installer
# Update these when new versions are released

# NGINX
readonly NGINX_VERSION="1.29.1"
readonly NGINX_URL="https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz,https://github.com/nginx/nginx/archive/refs/tags/release-${NGINX_VERSION}.tar.gz"
readonly NGINX_SHA256="c589f7e7ed801ddbd904afbf3de26ae24eb0cce27c7717a2e94df7fb12d6ad27"

# OpenSSL
readonly OPENSSL_VERSION="3.5.2"
readonly OPENSSL_URL="https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz,https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
readonly OPENSSL_SHA256="c53a47e5e441c930c3928cf7bf6fb00e5d129b630e0aa873b08258656e7345ec"

# PCRE2
readonly PCRE2_VERSION="10.45"
readonly PCRE2_URL="https://github.com/PCRE2Project/pcre2/releases/download/pcre2-${PCRE2_VERSION}/pcre2-${PCRE2_VERSION}.tar.gz"
readonly PCRE2_SHA256="0e138387df7835d7403b8351e2226c1377da804e0737db0e071b48f07c9d12ee"

# zlib
readonly ZLIB_VERSION="1.3.1"
readonly ZLIB_URL="https://zlib.net/zlib-${ZLIB_VERSION}.tar.gz,https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz"
readonly ZLIB_SHA256="9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23"

# headers-more module
readonly HEADERS_MORE_VERSION="0.39"
readonly HEADERS_MORE_URL="https://github.com/openresty/headers-more-nginx-module/archive/refs/tags/v${HEADERS_MORE_VERSION}.tar.gz"
readonly HEADERS_MORE_SHA256="dde68d3fa2a9fc7f52e436d2edc53c6d703dcd911283965d889102d3a877c778"

# zstd nginx module
readonly ZSTD_MODULE_VERSION="0.1.1"
readonly ZSTD_MODULE_URL="https://github.com/tokers/zstd-nginx-module/archive/refs/tags/${ZSTD_MODULE_VERSION}.tar.gz"
readonly ZSTD_MODULE_SHA256="707d534f8ca4263ff043066db15eac284632aea875f9fe98c96cea9529e15f41"

# Build configuration
readonly PREFIX="/usr/local/nginx"
readonly BACKUP_DIR="/root/nginx-backup-$(date +%Y%m%d-%H%M%S)"
readonly SERVICE_NAME="nginx"

# Build directories (created dynamically)
BUILD_DIR="$(mktemp -d -t nginx-build-XXXXXXXX)"
LOG_DIR="$(mktemp -d -t nginx-logs-XXXXXXXX)"

# Artifact catalog
ARTIFACTS=(
    "nginx|nginx-${NGINX_VERSION}.tar.gz|${NGINX_SHA256}|1|nginx-${NGINX_VERSION}||${NGINX_URL}"
    "openssl|openssl-${OPENSSL_VERSION}.tar.gz|${OPENSSL_SHA256}|0|openssl-${OPENSSL_VERSION}||${OPENSSL_URL}"
    "pcre2|pcre2-${PCRE2_VERSION}.tar.gz|${PCRE2_SHA256}|0|pcre2-${PCRE2_VERSION}||${PCRE2_URL}"
    "zlib|zlib-${ZLIB_VERSION}.tar.gz|${ZLIB_SHA256}|0|zlib-${ZLIB_VERSION}||${ZLIB_URL}"
    "headers-more|headers-more.tar.gz|${HEADERS_MORE_SHA256}|1|headers-more-module|ENABLE_HEADERS_MORE|${HEADERS_MORE_URL}"
    "zstd|zstd-module.tar.gz|${ZSTD_MODULE_SHA256}|1|zstd-module|ENABLE_ZSTD|${ZSTD_MODULE_URL}"
)
